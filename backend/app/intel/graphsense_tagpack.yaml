# ============================================================================================
# BUNDLED GraphSense TagPack SNAPSHOT (P8.7.3). A curated, faithful slice of real public GraphSense
# TagPack attribution data (github.com/graphsense/graphsense-tagpacks, MIT, packs/), shipped so
# "Check intel" ATTRIBUTION (the entity ring + entity table) works OFFLINE out of the box. This is the
# APP's live bundled intel — DISTINCT from the per-case validation fixtures under backend/tests/
# fixtures/ (those drive the make-smoke validation cases and are never shipped as the app's source).
#
# NOT the full public TagPack set — use Settings -> Intel sources -> "Refresh from source" to pull a
# current pack. Attributions are sourced CLAIMS (Invariants #3/#4): they enrich an address ALREADY in a
# case, never inject one, and are shown side-by-side with other sources, never merged.
#
# The addresses below are the SAME real OFAC-designated addresses as the bundled ofac_sdn.xml, mapped to
# their public entity attributions (entity name + category + actor) — so a sanctioned address also
# carries a human-readable entity label. Confirmed sources (CLAUDE.md §6): ultrasoundmoney/
# ofac-ethereum-addresses + OFAC recent-actions. Snapshot curated 2026-06-30.
# ============================================================================================
